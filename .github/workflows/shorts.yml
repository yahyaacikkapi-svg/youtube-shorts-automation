name: YouTube Shorts Auto-Pipeline

on:
  workflow_dispatch:
    inputs:
      privacy:
        description: "Video privacy (private/unlisted/public)"
        required: false
        default: "public"

  schedule:
    # 16:00 + 22:00 UTC = TR 19:00 + 01:00 / US East 12:00 + 18:00 (2 videos/day)
    - cron: "0 16,22 * * *"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python shorts_automation.py --privacy private --auto-public-after 600
          else
            PRIVACY="${{ github.event.inputs.privacy || 'public' }}"
            python shorts_automation.py --privacy "$PRIVACY"
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: outputs/
          retention-days: 3
