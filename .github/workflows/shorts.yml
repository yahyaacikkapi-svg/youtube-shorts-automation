name: YouTube Shorts Auto-Pipeline

on:
  workflow_dispatch:
    inputs:
      privacy:
        description: "Video privacy (private/unlisted/public)"
        required: false
        default: "public"
      skip_upload:
        description: "Skip YouTube upload (test only, downloads outputs as artifact)"
        required: false
        type: boolean
        default: false

  schedule:
    # Fire 18 min before target slot (15:42 + 21:42 UTC). With ~3 min pipeline
    # runtime, upload finishes ~15 min before public time, giving the desired
    # private-then-public-15min window. publishAt is locked to TR 19:00/01:00,
    # so videos still go public exactly on time.
    - cron: "42 15,21 * * *"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python shorts_automation.py --privacy private --publish-at-tr "19:00,01:00" --upload-thumbnail
          elif [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
            python shorts_automation.py --no-upload
          else
            PRIVACY="${{ github.event.inputs.privacy || 'public' }}"
            python shorts_automation.py --privacy "$PRIVACY" --upload-thumbnail
          fi

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ github.run_id }}
          path: outputs/
          retention-days: 3
          if-no-files-found: ignore
